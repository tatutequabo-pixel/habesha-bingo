<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habesha Bingo 🎱</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Habesha Bingo 🎱</h1>

<!-- Host Panel -->
<div id="hostSection">
  <h2>Host Panel</h2>
  <p>Room Code: <strong id="roomCode"></strong></p>
  <div id="bingo-ball">
    <span id="number">--</span>
  </div>
  <button id="callBtn">Call Number</button>
  <h3>Called Numbers:</h3>
  <div id="calledNumbers"></div>
</div>

<hr>

<!-- Player Panel -->
<div id="playerSection">
  <h2>Player Panel</h2>
  <input id="playerName" placeholder="Enter Your Name">
  <input id="roomInput" placeholder="Enter Room Code">
  <button id="joinBtn">Join Game</button>
  <div id="playerCard" class="bingo-card"></div>
</div>

<script type="module" src="host.js"></script>
<script type="module" src="player.js"></script>
</body>
</html>
