<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habesha Bingo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <img id="logo" src="logo.png" alt="Habesha Bingo Logo">
  <h1>Habesha Bingo</h1>
  <div class="main-buttons">
    <button onclick="goHost()">Host Login</button>
    <button onclick="goPlayer()">Play as Player</button>
  </div>

  <script>
    function goHost() {
      const password = prompt("Enter host password:");
      if(password === "Hanilove1"){
        window.location.href = "host.html";
      } else alert("Wrong password!");
    }
    function goPlayer() {
      window.location.href = "player.html";
    }
  </script>
</body>
</html>
