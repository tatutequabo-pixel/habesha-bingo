<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎱 Habesha Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* =====================
       BODY / CONTAINER
    ===================== */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: radial-gradient(circle at top left, #ffd9a0, #ffb347);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 2rem;
      color: #c00;
    }

    p {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #333;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      background: #c00;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #a00;
      transform: scale(1.05);
    }

    footer {
      margin-top: 15px;
      font-size: 0.8rem;
      color: #666;
    }

    /* MOBILE ADJUSTMENT */
    @media (max-width: 500px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      button {
        font-size: 1rem;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎱 Habesha Bingo</h1>
    <p>Welcome! Select how you want to join:</p>

    <!-- HOST -->
    <button onclick="window.location.href='host.html'">
      Host Game
    </button>

    <!-- PLAYER -->
    <button onclick="window.location.href='player.html'">
      Join as Player
    </button>

    <footer>
      &copy; 2026 Habesha Bingo
    </footer>
  </div>
</body>
</html>
