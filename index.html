<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habesha Bingo 🎱</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Habesha Bingo 🎱</h1>

<!-- Choice Screen -->
<div id="choiceScreen">
  <h2>Start Game</h2>
  <button id="startHost">Start as Host</button>
  <button id="joinPlayer">Join as Player</button>
</div>

<!-- Host Panel -->
<div id="hostSection" style="display:none">
  <h2>Host Panel</h2>
  <p>Room Code: <strong id="roomCode"></strong></p>
  <div id="bingo-ball">
    <span id="number">--</span>
  </div>
  <button id="callBtn">Call Number</button>
  <h3>Called Numbers:</h3>
  <div id="calledNumbers"></div>
</div>

<!-- Player Panel -->
<div id="playerSection" style="display:none">
  <h2>Player Panel</h2>
  <input id="playerName" placeholder="Enter Your Name">
  <input id="roomInput" placeholder="Enter Room Code">
  <button id="joinBtn">Join Game</button>
  <div id="playerCard" class="bingo-card"></div>
  <div id="playerBall">
    <span id="playerNumber">--</span>
  </div>
</div>

<script>
const choiceScreen = document.getElementById('choiceScreen');
const hostSection = document.getElementById('hostSection');
const playerSection = document.getElementById('playerSection');

document.getElementById('startHost').addEventListener('click', () => {
  choiceScreen.style.display = 'none';
  hostSection.style.display = 'block';
  import('./host.js');
});

document.getElementById('joinPlayer').addEventListener('click', () => {
  choiceScreen.style.display = 'none';
  playerSection.style.display = 'block';
  import('./player.js');
});
</script>

</body>
</html>
