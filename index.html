<!DOCTYPE html>
<html>
<head>
  <title>Habesha Bingo Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Habesha Bingo</h1>

<div class="login-box">
  <h2>Login as Host</h2>
  <input type="password" id="hostPassword" placeholder="Host Password">
  <button onclick="loginHost()">Login as Host</button>

  <h2>Login as Player</h2>
  <button onclick="loginPlayer()">Login as Player</button>
</div>

<script>
  function loginHost() {
    const pass = document.getElementById("hostPassword").value;
    if (pass === "1234") {
      window.location.href = "host.html";
    } else {
      alert("Wrong password");
    }
  }

  function loginPlayer() {
    window.location.href = "player.html";
  }
</script>

</body>
</html>
