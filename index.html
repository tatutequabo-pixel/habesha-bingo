<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎰 Habesha Bingo 🎰</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>🎰 Habesha Bingo 🎰</h1>

<!-- HOST PANEL -->
<div id="hostPanel" style="display:none;">
  <h2>Host Panel</h2>
  <button id="callNumber">Call Number</button>
  <h1 id="currentCall">---</h1>
  <h3>Players Joined</h3>
  <ul id="players"></ul>
  <button class="backHome">Return Home</button>
</div>

<!-- PLAYER PANEL -->
<div id="playerPanel" style="display:none;">
  <h2>Player Panel</h2>
  <input id="playerName" placeholder="Your name">
  <button id="joinGame">Join Game</button>

  <div id="bingoCard"></div>

  <button id="lockCard">Lock Card</button>
  <button id="bingoBtn">BINGO!</button>

  <h2 id="status"></h2>

  <div id="coinsPanel">Coins: <span id="coins">10</span></div>
  <button id="donateBtn">Donate</button>
  <button class="backHome">Return Home</button>
</div>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const isHost = params.get("host")==="1";

if(isHost){
  document.getElementById("hostPanel").style.display="block";
  socket.emit("registerHost");
  const hostScript=document.createElement("script"); hostScript.src="host.js"; document.body.appendChild(hostScript);
}else{
  document.getElementById("playerPanel").style.display="block";
  const playerScript=document.createElement("script"); playerScript.src="player.js"; document.body.appendChild(playerScript);
}

document.querySelectorAll(".backHome").forEach(btn=>{
  btn.onclick=()=>{ window.location.href="index.html"; };
});

document.getElementById("donateBtn").onclick=()=>{
  alert("Redirect to PayPal/Patreon donation link here");
};
</script>
</body>
</html>
