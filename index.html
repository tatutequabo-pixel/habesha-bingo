<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎰 Habesha Bingo 🎰</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>🎰 Habesha Bingo 🎰</h1>

<!-- PLAYER PANEL -->
<div id="playerPanel">
  <h2>Player Panel</h2>
  <input id="playerName" placeholder="Your name">
  <button id="joinGame">Join Game</button>

  <div id="bingoCard"></div>

  <button id="lockCard">Lock Card</button>
  <button id="bingoBtn">BINGO!</button>

  <h2 id="status"></h2>

  <div id="coinsPanel">Coins: <span id="coins">10</span></div>
  <button id="donateBtn">Donate</button>
</div>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);

// Only you can be host using secret key
const isHost = params.get("secret") === "Hanilove1"; // CHANGE THIS TO YOUR SECRET

if(isHost){
  const hostScript=document.createElement("script");
  hostScript.src="host.js";
  document.body.appendChild(hostScript);
  socket.emit("registerHost");
} else {
  const playerScript=document.createElement("script");
  playerScript.src="player.js";
  document.body.appendChild(playerScript);
}

// Donate button
document.getElementById("donateBtn").onclick=()=>{
  alert("Redirect to PayPal/Patreon donation link here");
};
</script>

</body>
</html>
