<!DOCTYPE html>
<html>
<head>
    <title>Habesha Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="logo.png" class="logo">
        <h1>Habesha Bingo</h1>

        <h2>Host Login</h2>
        <input type="password" id="hostPass" placeholder="Enter host password">
        <button onclick="loginHost()">Log in as Host</button>

        <h2>Players</h2>
        <a href="/player" class="player-btn">Enter as Player</a>
    </div>

    <script>
        function loginHost() {
            const pass = document.getElementById('hostPass').value;
            window.location.href = `/host?password=${pass}`;
        }
    </script>
</body>
</html>
