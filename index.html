<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habesha Bingo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Habesha Bingo!</h1>

  <!-- Called numbers -->
  <div id="called-balls"></div>

  <!-- Bingo table -->
  <table id="bingo-table">
    <thead>
      <tr>
        <th>B</th>
        <th>I</th>
        <th>N</th>
        <th>G</th>
        <th>O</th>
      </tr>
    </thead>
    <tbody>
      <!-- Numbers inserted by JS -->
    </tbody>
  </table>

  <button id="call-number">Call Number</button>

  <script src="script.js"></script>
</body>
</html>
