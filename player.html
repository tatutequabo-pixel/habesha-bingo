<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habesha Bingo - Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="casinoLobby">
  <h1>🎰 Habesha Bingo 🎰</h1>
  <p>Enter your player name to join the game:</p>
  <input type="text" id="playerName" placeholder="Your Name">
  <button id="startBtn">🎲 Join Game</button>
</div>

<div id="playerBoardContainer" style="display:none;">
  <h2 id="playerDisplayName"></h2>
  <div id="board" class="board"></div>
  <button id="bingoBtn">Bingo!</button>
</div>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="player.js"></script>
</body>
</html>
