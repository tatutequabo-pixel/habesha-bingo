<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habesha Bingo - Host Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Habesha Bingo - Host Panel</h1>
    <button id="create-game-btn" class="btn primary-btn">Create New Game</button>
    
    <section id="game-info" style="display:none;">
      <h2>Game Code: <span id="game-code-display"></span></h2>
      
      <h3>Player Codes (Share these)</h3>
      <ul id="codes-list" class="codes-list"></ul>
      
      <button id="start-game-btn" class="btn start-btn" disabled>Start Auto Calling Numbers</button>
      
      <h3>Called Numbers</h3>
      <div id="called-numbers" class="called-numbers"></div>

      <div id="winner-banner" class="winner-banner" style="display:none;"></div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="host.js"></script>
</body>
</html>
