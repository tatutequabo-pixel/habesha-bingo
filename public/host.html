<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habesha Bingo - Host</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ================= LOGIN PANEL ================= -->
  <div id="loginPanel">
    <h2>Host Login</h2>
    <input type="password" id="hostPassword" placeholder="Enter Host Password" required>
    <button id="startGameBtn">Start Game</button>
    <p>Password: <strong>Hanilove1</strong></p>
  </div>

  <!-- ================= HOST PANEL ================= -->
  <div id="hostPanel" class="hidden">
    <h2>Host Panel</h2>

    <!-- Player codes -->
    <div id="codes"></div>

    <!-- Bingo board preview -->
    <h3>Board Preview</h3>
    <div id="boardPreview" class="bingo-board"></div>

    <!-- Number input -->
    <input type="text" id="numberInput" placeholder="Enter number (e.g., B12)">
    <button id="callNumberBtn">Call Number</button>

    <!-- Winner Banner -->
    <div id="winnerBannerHost" class="winner-banner"></div>

    <!-- Reset -->
    <button id="resetGameBtn">Reset Game</button>
  </div>

  <!-- ================= SOCKET.IO ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="host.js"></script>
</body>
</html>
