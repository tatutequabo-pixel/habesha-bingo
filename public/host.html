<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habesha Bingo - Host</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>Habesha Bingo - Host Panel</h1>

    <div id="login-section">
        <input type="password" id="host-password" placeholder="Enter Host Password" />
        <button class="btn primary-btn" id="login-btn">Login</button>
        <p id="login-error" style="color:red; display:none;">Wrong Password</p>
    </div>

    <div id="dashboard" style="display:none;">
        <h2>Player Codes</h2>
        <ul id="codes-list" class="codes-list"></ul>

        <button class="btn start-btn" id="start-game-btn">Start Game</button>

        <h3>Called Numbers</h3>
        <div id="called-numbers" class="called-numbers"></div>

        <div id="winner-banner" class="winner-banner" style="display:none;"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="host.js"></script>
</body>
</html>
