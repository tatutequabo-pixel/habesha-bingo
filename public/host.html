<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habesha Bingo - Host</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Habesha Bingo - Host Panel</h1>

    <div id="loginPanel">
      <input id="hostPassword" type="password" placeholder="Enter Host Password">
      <button id="startGameBtn">Start Game</button>
    </div>

    <div id="hostPanel" class="hidden">
      <h2>Player Codes</h2>
      <div id="codes" class="codes-container"></div>

      <div class="host-controls">
        <button id="callNumberBtn">Call Number</button>
        <button id="resetGameBtn">Reset Game</button>
      </div>

      <div class="bingo-board">
        <div class="bingo-header">
          <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
        </div>
        <div id="boardPreview" class="board-grid"></div>
      </div>

      <div id="winnerBannerHost" class="hidden"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="host.js"></script>
</body>
</html>
