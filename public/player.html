<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habesha Bingo - Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ================= LOGIN PANEL ================= -->
  <div id="loginPanel">
    <h2>Join Habesha Bingo</h2>
    <input type="text" id="playerName" placeholder="Enter your name" required>
    <input type="text" id="playerCode" placeholder="Enter your code" required>
    <button id="joinGameBtn">Join Game</button>
    <p>Enter your name and unique code provided by the host.</p>
  </div>

  <!-- ================= GAME PANEL ================= -->
  <div id="gamePanel" class="hidden">
    <h2>Your Bingo Board</h2>
    <div id="playerBoard" class="bingo-board"></div>
    <div id="winnerBanner" class="winner-banner"></div>
  </div>

  <!-- ================= SOCKET.IO ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="player.js"></script>
</body>
</html>
