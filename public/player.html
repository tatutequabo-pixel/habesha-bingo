<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habesha Bingo - Player</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>Habesha Bingo - Player Panel</h1>

    <div id="join-section">
        <input type="text" id="player-name" placeholder="Your Name" />
        <input type="text" id="player-code" placeholder="Player Code" maxlength="6" />
        <button class="btn primary-btn" id="join-btn">Join Game</button>
        <p id="join-error" style="color:red; display:none;">Invalid Code</p>
    </div>

    <div id="game-section" style="display:none;">
        <h2>Your Bingo Board</h2>
        <div id="board" class="board"></div>
        <button class="btn bingo-btn" id="bingo-btn">Call BINGO!</button>
        <div id="winner-banner" class="winner-banner" style="display:none;"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="player.js"></script>
</body>
</html>
